<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Moedas | Finanças Globais</title>
  
  <!-- Fontes e ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="imagens/dinheiro.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container animate__animated animate__fadeInUp">
    <!-- Cabeçalho do conversor -->
    <div class="conversion-header">
      <i class="fas fa-calculator"></i>
      <h2>Conversor Global de Moedas</h2>
    </div>
    
    <div class="conversion-body">
      <!-- Painel de entrada -->
      <div class="input-grid">
        <div class="input-group">
          <label class="input-label">Valor para Converter</label>
          <div class="input-with-icon">
            <span class="currency-flag" id="baseFlag">💵</span>
            <input type="number" id="amount" class="amount-input" value="100" min="0" step="0.01">
          </div>
        </div>
        
        <div class="input-group">
          <label class="input-label">Moeda de Origem</label>
          <select id="base"></select>
        </div>
        
        <div class="input-group">
          <label class="input-label">Moeda de Destino</label>
          <select id="target"></select>
        </div>
        
        <button class="swap-btn" id="swap">
          <i class="fas fa-exchange-alt"></i>
          Trocar
        </button>
      </div>
      
      <!-- Painel de resultados -->
      <div class="results-panel">
        <div class="result-card">
          <div class="card-label">
            <i class="fas fa-chart-line"></i>
            <span>Cotação Atual</span>
          </div>
          <div class="card-value" id="rateCard">–</div>
        </div>
        
        <div class="result-card">
          <div class="card-label">
            <i class="fas fa-clock"></i>
            <span>Última Atualização</span>
          </div>
          <div class="card-value" id="updateCard">–</div>
        </div>
        
        <div class="result-card" id="resultCard">
          <div class="card-label">
            <i class="fas fa-check-circle"></i>
            <span>Resultado da Conversão</span>
          </div>
          <div class="card-value">–</div>
        </div>
      </div>
      
      <!-- Painel de controles -->
      <div class="controls-panel">
        <div class="controls-grid">
          <button class="refresh-btn" id="refresh">
            <span id="refreshText">Atualizar Agora</span>
          </button>
          
          <div class="auto-refresh-group">
            <div class="checkbox-container">
              <input type="checkbox" id="autoRefresh" checked>
              <label for="autoRefresh">
                Atualização Automática
                <i class="fas fa-info-circle info-icon" data-tooltip="Atualiza as taxas automaticamente no intervalo selecionado"></i>
              </label>
            </div>
            
            <div class="interval-selector">
              <select id="interval">
                <option value="5000">A cada 5 segundos</option>
                <option value="10000">A cada 10 segundos</option>
                <option value="30000" selected>A cada 30 segundos</option>
                <option value="60000">A cada 1 minuto</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Mensagem de erro -->
      <div id="error" class="error-message">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Erro ao carregar cotações. Verifique sua conexão.</span>
      </div>
  <script src="script.js"></script>
</body>
</html>
