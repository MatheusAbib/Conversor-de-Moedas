<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Moedas | Finanças Globais</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header animate__animated animate__fadeInDown">
    <h1><i class="fas fa-globe-americas"></i> Conversor Global</h1>
  </div>

  <div class="main-container">
    <div class="config-card animate__animated animate__fadeInLeft">
      <div class="card-header">
        <i class="fas fa-sliders-h"></i>
        <h3>Configurações da Conversão</h3>
      </div>
      <div class="card-body">
        <div class="input-group">
          <label class="input-label">
            <i class="fas fa-dollar-sign"></i> Valor para Converter
          </label>
          <div class="input-with-icon">
            <span class="currency-flag" id="baseFlag"><i class="fas fa-dollar-sign"></i></span>
            <input type="number" id="amount" class="amount-input" value="100" min="0" step="0.01" placeholder="Digite o valor">
          </div>
        </div>
        
        <div class="input-group">
          <label class="input-label">
            <i class="fas fa-exchange-alt"></i> Moeda de Origem
          </label>
          <select id="base"></select>
        </div>
        
        <div class="input-group">
          <label class="input-label">
            <i class="fas fa-arrow-right"></i> Moeda de Destino
          </label>
          <select id="target"></select>
        </div>
        
        <button class="swap-btn" id="swap">
          <i class="fas fa-exchange-alt"></i>
          Inverter Moedas
        </button>
      </div>
    </div>

    <div class="result-card-container animate__animated animate__fadeInRight">
      <div class="card-header">
        <i class="fas fa-chart-line"></i>
        <h3>Resultado da Conversão</h3>
      </div>
      <div class="card-body">
        <div class="result-item" id="resultItem">
          <div class="result-label">
            <i class="fas fa-check-circle" style="color: #2ecc71;"></i>
            <span>VALOR CONVERTIDO</span>
          </div>
          <div class="result-value large" id="convertedValue">–</div>
          <div class="rate-detail" id="rateDetail">–</div>
        </div>
        
        <div class="result-item">
          <div class="result-label">
            <i class="fas fa-chart-line" style="color: #3498db;"></i>
            <span>COTAÇÃO ATUAL</span>
          </div>
          <div class="result-value" id="rateCard">–</div>
        </div>
        
        <div class="result-item">
          <div class="result-label">
            <i class="fas fa-clock" style="color: #f39c12;"></i>
            <span>ÚLTIMA ATUALIZAÇÃO</span>
          </div>
          <div class="result-value" id="updateCard">–</div>
        </div>
        
        <div class="refresh-section">
          <button class="refresh-btn" id="refresh">
            <span id="refreshText"><i class="fas fa-sync-alt"></i> Atualizar Agora</span>
          </button>
          
          <div class="auto-refresh-group">
            <div class="checkbox-container">
              <input type="checkbox" id="autoRefresh" checked>
              <label for="autoRefresh">
                <i class="fas fa-clock"></i> Atualização Automática
              </label>
            </div>
            
            <div class="interval-selector">
              <select id="interval">
                <option value="5000">A cada 5 segundos</option>
                <option value="10000">A cada 10 segundos</option>
                <option value="30000" selected>A cada 30 segundos</option>
                <option value="60000">A cada 1 minuto</option>
              </select>
            </div>
          </div>
        </div>
        
        <div id="error" class="error-message">
          <i class="fas fa-exclamation-triangle"></i>
          <span>Erro ao carregar cotações. Verifique sua conexão.</span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
